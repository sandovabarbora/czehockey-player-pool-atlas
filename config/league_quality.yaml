# League quality multipliers, applied ONLY to production-rate metrics
# (goals/60, assists/60, shots/60, xG/60) in the quality-adjusted projection.
#
# These are SUBJECTIVE APPROXIMATIONS. They smooth over differences in rules,
# ice size, schedule density, and roster composition. The report's Limitations
# section names them as such, and a sensitivity notebook shows how the map
# changes when each multiplier shifts by ±20%.
#
# Reference: hockeyviz.com league quality comparisons; Sznajder & others on
# cross-league NHL-equivalency. Cite the source explicitly in the report
# methodology section.

multipliers:
  nhl:       1.00
  ahl:       0.55
  shl:       0.45
  liiga:     0.42
  nl:        0.40
  extraliga: 0.35
  cz1l:      0.20

# Sensitivity range used in the perturbation notebook
sensitivity_pct: 0.20  # +/- 20%

# Metrics affected by the multiplier (rate-independent metrics are NOT scaled)
scaled_metrics:
  - goals_per_60
  - assists_per_60
  - shots_per_60
  - xg_per_60
  - points_per_60_pp

# Metrics NOT scaled (interpreted as role / context signals)
unscaled_metrics:
  - age
  - toi_per_game
  - defensive_zone_start_pct
  - penalty_differential_per_60
  - pp_toi_per_game
  - pk_toi_per_game
