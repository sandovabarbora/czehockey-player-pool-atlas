# Hand-edited cluster archetype labels.
# Generated by post-hoc inspection of cluster members (Day 7).
# Format: position_projection_clusterId -> {label_cs, label_en, description_cs}

forwards_style:
  0:
    label_cs: "Top-six skórující"
    label_en: "Top-six scorers"
    description_cs: "Vysoká produkce gólů + asistencí, NHL stars (Pastrňák, Hertl, Zacha, Nečas) + EU elita (Mazura). Mediánový ročník 1996."
    tactical_cs: "Shooting-heavy top-six profil. Statistický otisk konzistentní s hráči, kteří generují vlastní střelu z controlled-entry situations a drží PP1 minutáž. Reprezentační kontext: hráči tohoto clusteru typicky nesou ofenzivní zatížení první lajny."
  1:
    label_cs: "Mladí prospekti / doplnění"
    label_en: "Young prospects / depth"
    description_cs: "Nízká produkce, mediánový ročník 2001. Většinou Extraliga (112/122). Junior callupy a mladí depth hráči."
    tactical_cs: "Development pool. Cluster přechodný: kariérní arc je tu rozhodující signál, ne aktuální stats. Pro reprezentační plánování v 4letém cyklu je tahle vrstva fund-the-future."
  2:
    label_cs: "Fyzičtí role-players"
    label_en: "Physical role players"
    description_cs: "Výrazně vysoké PIM (5-6× cohort medián). Velcí hráči: Klapka (NHL prospect), Zohorna, Lakatoš. Středně-vyšší věk."
    tactical_cs: "Physical engagement profil: high-PIM signál ukazuje na třetí lajny / bottom-six minutáž s rolí v energy či forecheck. Cluster nemísí elite production se size; stylová separace od scorers je zřetelná."
  3:
    label_cs: "Veteránští two-way"
    label_en: "Veteran utility"
    description_cs: "Mediánový ročník 1994, nižší produkce než C0. Mix NHL veteránů (Palát, Faksa, Nosek, Kampf) a Extraliga regulars."
    tactical_cs: "Two-way / utility middle-six. Hráči, kteří v reprezentačním kontextu obvykle drží PK minuty, defensive-zone faceoffs a structure-of-play roli. Stylový profil mezi pure scorers a defensive specialists."

forwards_quality:
  # Quality projection has K=5, different cluster structure. Labels assigned
  # in same spirit but reflect the league-multiplier-adjusted ranking.
  0:
    label_cs: "NHL elita"
    label_en: "NHL elite"
    description_cs: "Po aplikaci multiplierů: top NHL hráči pull dramaticky vpravo."
  1:
    label_cs: "EU elita po korekci"
    label_en: "EU elite (after adjustment)"
    description_cs: "Top EU scorers: Červenka, Kantner, Jašek, Sedlák. Vysoká EU produkce, ale za NHL elitou."
  2:
    label_cs: "Solidní NHL doplnění"
    label_en: "Solid NHL depth"
    description_cs: "Hráči jako Faksa, Klapka: top-9/10 NHL minutáž ale ne elite produkce."
  3:
    label_cs: "EU veteráni"
    label_en: "EU veterans"
    description_cs: "Stabilní Extraliga + Liiga regulars střední věkové skupiny."
  4:
    label_cs: "EU mladá / depth"
    label_en: "EU young / depth"
    description_cs: "Mladí EU hráči (juniorský věk + raní pro)."

defense_style:
  0:
    label_cs: "Ofenzivní obránci"
    label_en: "Offensive defensemen"
    description_cs: "Vyšší A/GP (0.29), playmaking z modré. Hronek (NHL), Jordan (Liiga), Alscher, Kaňák."
    tactical_cs: "Power-play QB / puck-moving D profil. A/GP dominuje nad G/GP, statistický otisk odpovídá first-pair offensive obráncům s breakout-control rolí. Hodnota se realizuje v týmech s perimetr-heavy PP strukturou."
  1:
    label_cs: "Fyzičtí veteráni"
    label_en: "Physical veterans"
    description_cs: "Gudas (NHL), Pláněk, Šenkeřík. Nízká produkce, vyšší PIM. Pivot defenzivního stylu."
    tactical_cs: "Top-shutdown / matchup-pair profil. High-PIM signál koreluje s physical engagement v defensive-zone work. Cluster pure defensive D, často matched proti opposing top six."
  2:
    label_cs: "Mladí depth D"
    label_en: "Young depth defensemen"
    description_cs: "Mediánový ročník 2001, mostly Extraliga. Jiříček (NHL prospect), Hovorka, Trejbal, Hájek."
    tactical_cs: "Development blue-line pool. AHL/Extraliga callup volume, NHL prospekti. Cluster přechodný: top-pair NHL ceiling je u většiny open question, ne aktuální výpověď."
  3:
    label_cs: "Veteránští bodaři"
    label_en: "Veteran point-getters"
    description_cs: "Tichaček, Kundrátek, Krejčík. Vyšší A (0.29), starší (1992). Šedovlasí playmakeři z modré."
    tactical_cs: "PP2 utility / experienced offensive D. Continuity-of-system role, často spojnice mezi mladými top-pair D a defensive shutdowny. V reprezentačním kontextu drží známé schéma."
  4:
    label_cs: "Two-way střední věk"
    label_en: "Two-way mid-age"
    description_cs: "Vyrovnaný profil, mediánový ročník 2000."
    tactical_cs: "Bottom-pair / depth blue-line profil. Vyrovnaný statistický otisk bez specializace; kluster, kde se ztrácí distinkce mezi role-types. Utility hodnota podle týmového kontextu."
  5:
    label_cs: "Defenzivní depth"
    label_en: "Defensive depth"
    description_cs: "Šestá kategorie: typicky velmi mladí nebo strongly defensive."
    tactical_cs: "AHL/junior reserves nebo strongly defensive-only D. Cluster mimo aktivní NHL minutáž; relevance je organizational depth, ne aktuální role."

defense_quality:
  0:
    label_cs: "NHL D elita"
    label_en: "NHL D elite"
    description_cs: "Po korekci multiplierů: top NHL obránci."
  1:
    label_cs: "EU ofenzivní D"
    label_en: "EU offensive D"
    description_cs: "EU obránci s vyšší produkcí, po korekci v middle pack."
  2:
    label_cs: "Solidní EU veteráni"
    label_en: "Solid EU veterans"
    description_cs: "Extraliga regulars."
  3:
    label_cs: "Mladí prospekti"
    label_en: "Young prospects"
    description_cs: "Mladí D napříč ligami."
  4:
    label_cs: "Doplnění"
    label_en: "Depth"
    description_cs: "Nižší produkce / role players."
