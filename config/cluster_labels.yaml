    label_cs: "Ofenzivní obránci"
    label_en: "Offensive defensemen"
    description_cs: "Vyšší A/GP (0.29), playmaking z modré. Hronek (NHL), Jordan (Liiga), Alscher, Kaňák."
  1:
    label_cs: "Fyzičtí veteráni"
    label_en: "Physical veterans"
    description_cs: "Gudas (NHL), Pláněk, Šenkeřík. Nízká produkce, vyšší PIM. Pivot defenzivního stylu."
  2:
    label_cs: "Mladí depth D"
    label_en: "Young depth defensemen"
    description_cs: "Mediánový ročník 2001, mostly Extraliga. Jiříček (NHL prospect), Hovorka, Trejbal, Hájek."
  3:
    label_cs: "Veteránští bodaři"
    label_en: "Veteran point-getters"
    description_cs: "Tichaček, Kundrátek, Krejčík. Vyšší A (0.29), starší (1992). Šedovlasí playmakeři z modré."
  4:
    label_cs: "Two-way střední věk"
    label_en: "Two-way mid-age"
    description_cs: "Vyrovnaný profil, mediánový ročník 2000."
  5:
    label_cs: "Defenzivní depth"
    label_en: "Defensive depth"
    description_cs: "Šestá kategorie: typicky velmi mladí nebo strongly defensive."

